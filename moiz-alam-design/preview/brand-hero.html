<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  body { padding: 0; justify-content: center; align-items: center; flex-direction: row; gap: 28px; }
  .visual { position: relative; width: 150px; height: 100%; display: flex; align-items: flex-end; justify-content: center; }
  .photo { position: relative; height: 96%; width: auto; z-index: 1; }
  .txt { max-width: 320px; }
  .txt h4 { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; margin-bottom: 8px; }
  .txt p { font-size: 0.72rem; color: var(--off); line-height: 1.6; font-weight: 300; }
  .txt p b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <div class="visual">
    <img class="photo" src="../assets/hero-illustration-v2.png" alt="Moiz Alam" />
  </div>
  <div class="txt">
    <h4>The hero anchor</h4>
    <p>A clean illustrated full-body cutout portrait on a transparent PNG \u2014 cool, neutral palette (blue oxford shirt, charcoal jeans). <b>v2: the pale-blue blob behind it was removed</b> \u2014 the figure now floats free on cream, letting the serif display carry the composition.</p>
  </div>
</body>
</html>
