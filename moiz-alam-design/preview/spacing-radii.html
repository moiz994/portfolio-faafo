<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .grid { display: flex; gap: 22px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 9px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--card); border: 1px solid var(--rule); }
  .r8 { border-radius: 8px; } .r12 { border-radius: 12px; } .r14 { border-radius: 14px; } .r28 { border-radius: 28px; }
  .name { font-size: 0.66rem; font-weight: 600; color: var(--fg); }
  .v { font-size: 0.6rem; color: var(--mid); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box r8"></div><span class="name">Image</span><span class="v">8px</span></div>
    <div class="item"><div class="box r12"></div><span class="name">Chip</span><span class="v">12px</span></div>
    <div class="item"><div class="box r14"></div><span class="name">Card</span><span class="v">14px</span></div>
    <div class="item"><div class="box r28" style="width:120px"></div><span class="name">Pill / button</span><span class="v">28px</span></div>
  </div>
</body>
</html>
