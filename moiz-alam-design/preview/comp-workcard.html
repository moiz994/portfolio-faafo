<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  body { padding: 16px 20px; flex-direction: row; gap: 16px; align-items: stretch; }
  /* Bento card with image cover */
  .work-card { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 12px; width: 300px; }
  .cover { overflow: hidden; border-radius: 12px 12px 0 0; margin: -22px -22px 0 -22px; height: 120px; background: linear-gradient(120deg,#9aabbd,#5e6b78); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-num { font-size: 0.72rem; font-weight: 600; color: var(--rule); letter-spacing: 1px; }
  .wtag { padding: 3px 10px; border-radius: 12px; font-size: 0.64rem; font-weight: 500; background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-line); }
  h3 { font-family: var(--serif); font-size: 1.35rem; font-weight: 400; letter-spacing: -0.2px; }
  .desc { font-size: 0.8rem; color: var(--off); line-height: 1.55; font-weight: 300; }
  .desc em { color: var(--fg); font-style: normal; font-weight: 500; }
  /* Scroll card — full-bleed image + gradient + white text */
  .scroll-card { width: 220px; border-radius: 14px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 18px; background: linear-gradient(120deg,#6b7a52,#3f4a30); }
  .scroll-card::after { content:''; position:absolute; inset:0; background: var(--overlay); }
  .scroll-card .st { position: absolute; top: 14px; left: 14px; z-index: 1; }
  .scroll-card .wtag { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.18); }
  .scroll-card .bd { position: relative; z-index: 1; }
  .scroll-card h3 { color: #fff; }
  .scroll-card p { color: rgba(255,255,255,.72); font-size: 0.76rem; font-weight: 300; line-height: 1.5; }
  .lab { position: absolute; bottom: 6px; right: 10px; font-size: 0.54rem; color: var(--mid); text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="work-card">
    <div class="cover"></div>
    <div class="card-top"><span class="card-num">01</span><span class="wtag">AI · B2B SaaS</span></div>
    <h3>BenchPrep</h3>
    <p class="desc">LLM interview platform. Shipped to beta in <em>14 weeks</em>.</p>
    <span class="lab">Bento card</span>
  </div>
  <div class="scroll-card">
    <div class="st"><span class="wtag">Monetisation</span></div>
    <div class="bd"><h3>In-App Payments</h3><p>New revenue stream worth $700K+.</p></div>
    <span class="lab" style="color:rgba(255,255,255,.45)">Carousel card</span>
  </div>
</body>
</html>
