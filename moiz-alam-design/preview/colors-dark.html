<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  body { background: #2A2A2A; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { width: 100%; height: 52px; border-radius: 10px; border: 1px solid #3D3D3D; }
  .name { font-size: 0.72rem; font-weight: 600; color: #F9F5ED; }
  .hex { font-size: 0.66rem; color: #8A8680; font-variant-numeric: tabular-nums; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; max-width: 280px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#2A2A2A"></div><span class="name">bg</span><span class="hex">#2A2A2A</span></div>
    <div class="sw"><div class="chip" style="background:#343434"></div><span class="name">card</span><span class="hex">#343434</span></div>
    <div class="sw"><div class="chip" style="background:#3D3D3D"></div><span class="name">rule</span><span class="hex">#3D3D3D</span></div>
    <div class="sw"><div class="chip" style="background:#8A8680"></div><span class="name">off</span><span class="hex">#8A8680</span></div>
    <div class="sw"><div class="chip" style="background:#F9F5ED"></div><span class="name">fg</span><span class="hex">#F9F5ED</span></div>
  </div>
  <div class="grid2">
    <div class="sw"><div class="chip" style="background:#5E83AE"></div><span class="name">accent</span><span class="hex">#5E83AE</span></div>
    <div class="sw"><div class="chip" style="background:rgba(94,131,174,0.16);border-color:rgba(94,131,174,0.30)"></div><span class="name">soft</span><span class="hex">16% &alpha;</span></div>
  </div>
</body>
</html>
