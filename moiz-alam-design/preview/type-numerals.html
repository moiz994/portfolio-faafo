<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  .stats { display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .sv { font-family: var(--serif); font-size: 2.1rem; font-weight: 400; letter-spacing: -0.5px; line-height: 1; color: var(--fg); }
  .sl { font-size: 0.66rem; color: var(--mid); text-transform: uppercase; letter-spacing: 0.8px; }
  .div { width: 1px; height: 38px; background: var(--rule); }
  .meta { font-size: 0.62rem; color: var(--mid); margin-top: 18px; }
</style>
</head>
<body>
  <div class="stats">
    <div class="stat"><span class="sv">8+</span><span class="sl">Years</span></div>
    <div class="div"></div>
    <div class="stat"><span class="sv">$700K+</span><span class="sl">Revenue</span></div>
    <div class="div"></div>
    <div class="stat"><span class="sv">14 wks</span><span class="sl">0 to beta</span></div>
    <div class="div"></div>
    <div class="stat"><span class="sv">200+</span><span class="sl">Day-1 users</span></div>
  </div>
  <p class="meta">Numerals set in EB Garamond — serif carries the stats &amp; metrics, not a mono.</p>
</body>
</html>
