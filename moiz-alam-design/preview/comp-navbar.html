<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  body { padding: 0; justify-content: flex-start; }
  .navbar { display: flex; align-items: center; justify-content: space-between; padding: 0 26px; height: 60px; background: var(--nav-bg); backdrop-filter: blur(14px); border-bottom: 1px solid var(--rule); }
  .nav-logo { font-size: 0.9rem; font-weight: 700; letter-spacing: 3px; }
  .nav-right { display: flex; align-items: center; gap: 22px; }
  .nav-links { display: flex; gap: 26px; list-style: none; }
  .nav-links a { font-size: 0.83rem; color: var(--off); }
  .nav-resume { font-size: 0.78rem; font-weight: 600; color: var(--fg); background: var(--card); border: 1px solid var(--rule); padding: 6px 14px; border-radius: 20px; }
  .toggle { width: 20px; height: 20px; color: var(--mid); }
  .body-demo { padding: 24px 26px; }
  .meta { font-size: 0.62rem; color: var(--mid); }
</style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">MA</div>
    <div class="nav-right">
      <ul class="nav-links"><li><a href="#">Work</a></li><li><a href="#">Journey</a></li><li><a href="#">Human</a></li><li><a href="#">Let's Talk</a></li></ul>
      <span class="nav-resume">Resume ↓</span>
      <svg class="toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5" fill="currentColor" stroke="none"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="5.64" y1="5.64" x2="4.22" y2="4.22"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/><line x1="5.64" y1="18.36" x2="4.22" y2="19.78"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/></svg>
    </div>
  </nav>
  <div class="body-demo"><p class="meta">Fixed 60px frosted nav (blur 14px). Monogram + anchor links + pill résumé + sun/moon toggle.</p></div>
</body>
</html>
