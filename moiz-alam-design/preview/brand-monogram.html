<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="card.css" />
<style>
  body { flex-direction: row; align-items: center; gap: 34px; }
  .logo-ma { font-family: var(--serif); font-weight: 500; letter-spacing: -0.14em; line-height: 1; color: var(--fg); font-size: 4.4rem; }
  .ast { font-family: var(--serif); font-weight: 400; color: var(--fg); font-size: 2.4rem; line-height: 1; }
  .marks { display: flex; align-items: center; gap: 26px; }
  .div { width: 1px; height: 56px; background: var(--rule); }
  .meta { font-size: 0.62rem; color: var(--mid); max-width: 280px; line-height: 1.55; }
  .meta b { color: var(--off); font-weight: 600; }
</style>
</head>
<body>
  <div class="marks">
    <span class="logo-ma">MA</span>
    <div class="div"></div>
    <span class="ast">&#42;</span>
  </div>
  <p class="meta"><b>The MA ligature.</b> EB Garamond 500, letter-spacing −0.14em so the letters draw tight into one mark. The Garamond <b>reference asterisk</b> is the companion symbol for small/busy spaces. Monochrome only — ink or bone, never an accent. See <code>Logo System.html</code>.</p>
</body>
</html>
